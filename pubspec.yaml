name: notebook_ai
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.12
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  pull_to_refresh: ^2.0.0
  equatable: ^2.0.5
  decimal: ^3.0.2
  flutter_dotenv: ^6.0.0
  easy_localization: ^3.0.7
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  flutter_animate: ^4.5.2
  fluttertoast: ^9.0.0
  url_launcher: ^6.3.1
  defer_pointer: ^0.0.2
  animated_visibility: ^0.0.4
  back_button_interceptor: ^8.0.4
  smooth_corner: ^1.1.1
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  flutter_local_notifications: ^21.0.0
  async: ^2.13.1
  lottie: ^3.1.2
  isar: ^3.1.0+1

  nice_text_form:
      git: https://github.com/ahmedjihad2024/nice_text_form.git
  go_router: ^17.2.3
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.12.0
  flutter_gen_runner:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


dependency_overrides:
  intl: ^0.20.0
  
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app-icon.png"
  min_sdk_android: 21

flutter_gen:
  output: lib/presentation/res/gen/

  integrations:
    image: true
    flutter_svg: true
    rive: false
    lottie: true
  fonts:
    enabled: false

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/svg/
    - assets/images/
    - assets/fonts/