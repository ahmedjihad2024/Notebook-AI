name: CI

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Get Flutter packages
        run: flutter pub get

      - name: Run code generation (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Read app version
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '\r')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION%+*}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build release APK (split per ABI)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: flutter build apk --release --split-per-abi

      - name: Build universal release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: flutter build apk --release

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Keep only the latest 2 releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[2:] | .[].tagName' \
            | while read -r tag; do
                echo "Deleting old release and tag: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done

              