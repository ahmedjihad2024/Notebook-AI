name: notebook_ai
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.11.4

# Isar Community fork — the stock isar 3.1.0 generator pins analyzer <6.0 and
# is incompatible with Dart 3.11 / analyzer 8. The community fork supports it.
isar_version: &isar_version 3.3.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  pull_to_refresh: ^2.0.0
  easy_localization: ^3.0.7
  path_provider: ^2.1.5
  # fluttertoast: ^9.1.0
  back_button_interceptor: ^8.0.4
  smooth_corner: ^1.1.1
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  flutter_svg: ^2.0.12
  async: ^2.13.1
  isar_community: *isar_version
  isar_community_flutter_libs: *isar_version # contains Isar Core
  go_router: ^17.2.3
  logger: ^2.7.0
  lucide_icons_flutter: ^3.1.14+2
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_community_generator: *isar_version
  build_runner: any
  flutter_gen_runner:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


dependency_overrides:
  intl: ^0.20.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app-icon.png"
  min_sdk_android: 21

flutter_gen:
  output: lib/core/res/gen/

  integrations:
    image: true
    flutter_svg: true
    rive: false
    lottie: false
  fonts:
    enabled: false

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - .env
    - assets/translations/
    - assets/svg/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: dm_sans
      fonts:
        - asset: assets/fonts/DMSans-Light.ttf
          weight: 300
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700